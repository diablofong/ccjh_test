<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>屏縣公正國中 第三次段考練習</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div>
      <div style="font-size:1.2rem;font-weight:700">屏縣公正國中 第三次段考練習</div>
      <div class="sub">選擇題卷開始作答，完成後自動計算成績</div>
    </div>
  </header>

  <main class="index-main">
    <p class="index-intro">共 7 份題卷・答案依照課本重點整理・填完後點「計算成績」即可看到對錯</p>
    <div class="subject-grid" id="card-grid"></div>
  </main>

  <script src="js/questions.js"></script>
  <script>
    const META = {
      chinese_zhuyin: { badge: 'badge-cn',     label: '國文', desc: '填入對應的國字或注音符號' },
      chinese_zhushi: { badge: 'badge-cn',     label: '國文', desc: '寫出詞語或成語的解釋' },
      geography:      { badge: 'badge-geo',    label: '地理', desc: '第五、六單元・臺灣聚落交通與區域發展' },
      civics:         { badge: 'badge-civ',    label: '公民', desc: '第五、六單元・公平正義與社會福利' },
      history:        { badge: 'badge-his',    label: '歷史', desc: '第五、六單元・外交兩岸與經濟社會' },
      health:         { badge: 'badge-health', label: '健康教育', desc: '是非題 ○× 與選擇題 A～D' },
      biology:        { badge: 'badge-bio',    label: '生物',     desc: '國七下・第1～5章全冊複習' },
    };

    const grid = document.getElementById('card-grid');
    for (const [key, exam] of Object.entries(EXAMS)) {
      const m = META[key] || { badge: 'badge-cn', label: '', desc: '' };
      const total = exam.questions.length;
      const score = exam.totalScore;
      const card = document.createElement('a');
      card.className = 'exam-card';
      card.href = `exam.html?exam=${key}`;
      card.innerHTML = `
        <span class="badge ${m.badge}">${m.label}</span>
        <h2>${exam.title}</h2>
        <p class="meta">${m.desc}</p>
        <span class="score-chip">${total} 題・${score} 分</span>`;
      grid.appendChild(card);
    }
  </script>
</body>
</html>
